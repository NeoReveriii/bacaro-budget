<div id="main-content-area" class="main-view">

    <div class="ai-container">
        <div class="chat-window">
            <div class="chat-header">
                <h3>Kwarta AI <span>• Online</span></h3>
                <p>Personal Financial Assistant</p>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="msg ai-msg">
                    <div class="msg-bubble">
                        Hello {User}! I'm Kwarta, your budget assistant. Want me to do a breakdown of your finance? Just tell me what to do!
                    </div>
                </div>

                <div class="msg user-msg">
                    <div class="msg-bubble">
                        User message placeholder.
                    </div>
                </div>

                <div class="msg ai-msg">
                    <div class="msg-bubble">
                        <p>Label placeholder:</p>
                        <div class="dummy-graph-mini">Mini Graph Placeholder</div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="prompt-chips">
                    <button class="chip">Monthly Summary</button>
                    <button class="chip">Top Expense</button>
                    <button class="chip">Savings Tips</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" placeholder="Ask Kwarta AI about your finances...">
                    <button class="btn-send">➤</button>
                </div>
            </div>
        </div>
    </div>

</div>
