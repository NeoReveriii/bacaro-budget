<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Bacaro Budget Manager</title>
    <link rel="icon" type="image/png" href="/assets/images/bb_favicon.png">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <script src="/assets/js/main.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-modal-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .forgot-modal-card {
            background-color: var(--dark-green);
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .forgot-header h2 {
            color: var(--white);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .forgot-header p {
            color: var(--text-light);
            font-size: 16px;
            line-height: 1.5;
        }

        .forgot-form .input-group {
            position: relative;
            margin-bottom: 30px;
            width: 100%;
        }

        .forgot-form .floating-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .forgot-form .floating-input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(89, 131, 57, 0.2);
        }

        .forgot-form .floating-input::placeholder {
            color: transparent;
        }

        .forgot-form .floating-label {
            position: absolute;
            left: 20px;
            top: 16px;
            color: var(--text-light);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            background: transparent;
            padding: 0 4px;
        }

        .forgot-form .input-group:focus-within .floating-label,
        .forgot-form .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: -10px;
            font-size: 12px;
            color: var(--primary-green);
            font-weight: 600;
        }

        .forgot-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .forgot-btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(89, 131, 57, 0.3);
        }

        .forgot-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .forgot-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .forgot-footer a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .forgot-footer a:hover {
            color: var(--white);
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .forgot-modal-card {
                padding: 30px 20px;
                margin: 20px;
            }

            .forgot-header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-modal-container">
        <div class="forgot-modal-card">
            <div class="forgot-header">
                <h2>Forgot Password?</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <div id="message" class="message" style="display: none;"></div>

            <form id="forgotForm" class="forgot-form">
                <div class="input-group">
                    <input
                        type="email"
                        id="email"
                        class="floating-input"
                        placeholder=" "
                        required
                    >
                    <label class="floating-label">Email Address</label>
                </div>

                <button type="submit" class="forgot-btn" id="submitBtn">
                    Send Reset Link
                </button>
            </form>

            <div class="forgot-footer">
                <a href="/guest.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const emailInput = document.getElementById('email');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Sending...';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/password-reset?action=forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    form.reset();
                } else {
                    showMessage(data.error || 'An error occurred', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Failed to send reset link. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Link';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
